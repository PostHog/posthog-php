name: "Release"

on:
  push:
    branches: [main]
    paths:
      - '.changeset/*.md'
  workflow_dispatch:

permissions:
  contents: read

# Concurrency control: only one release process can run at a time
# This prevents race conditions if multiple releasable change intents merge simultaneously
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check-changesets:
    name: Check for change intents
    runs-on: ubuntu-latest
    outputs:
      has-changesets: ${{ steps.check.outputs.has-changesets }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Check for change intents
        id: check
        run: |
          shopt -s nullglob
          change_intents=(.changeset/*.md)
          if [ "${#change_intents[@]}" -eq 0 ]; then
            releasable_count=0
          else
            releasable_count=$(grep -El "^[[:space:]]*['\"]?posthog-php['\"]?[[:space:]]*:[[:space:]]*(patch|minor|major)[[:space:]]*$" "${change_intents[@]}" | wc -l | tr -d ' ' || true)
          fi

          if [ "$releasable_count" -gt 0 ]; then
            echo "has-changesets=true" >> "$GITHUB_OUTPUT"
            echo "Found $releasable_count releasable change intent(s)"
          else
            echo "has-changesets=false" >> "$GITHUB_OUTPUT"
            echo "No releasable change intents found"
          fi

  prepare-release-candidate:
    name: Prepare release candidate
    needs: check-changesets
    runs-on: ubuntu-latest
    if: needs.check-changesets.outputs.has-changesets == 'true'
    permissions:
      contents: read
    outputs:
      new-version: ${{ steps.candidate.outputs.new-version }}
      patch-sha256: ${{ steps.candidate.outputs.patch-sha256 }}
      source-sha: ${{ steps.candidate.outputs.source-sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm and Node.js
        uses: pnpm/setup@5d160c5bc68a09337ad0d5654e237e03253b5879 # v1.0.0
        with:
          # Native release management requires pnpm >=11.13.0.
          version: 11.13.1
          runtime: node@24
          cache: true
          install: false

      - name: Apply change intents and update version
        id: candidate
        env:
          # If scripts/bump-version.sh changes, recompute this with:
          # sha256sum scripts/bump-version.sh
          # Then update EXPECTED_BUMP_SCRIPT_SHA256 in this workflow in the same PR.
          EXPECTED_BUMP_SCRIPT_SHA256: fb70c4da11c73df4da1b5b8d3cbd7e483cd19525dc9d8045f6c53a1bd1546809
        run: |
          set -euo pipefail

          source_sha=$(git rev-parse HEAD)
          pnpm version -r
          git add --intent-to-add .changeset/ledger.yaml
          new_version=$(node -p "require('./package.json').version")

          actual_bump_script_sha256=$(sha256sum scripts/bump-version.sh | awk '{print $1}')
          if [ "$actual_bump_script_sha256" != "$EXPECTED_BUMP_SCRIPT_SHA256" ]; then
            echo "scripts/bump-version.sh sha256 mismatch: expected $EXPECTED_BUMP_SCRIPT_SHA256, got $actual_bump_script_sha256" >&2
            exit 1
          fi

          ./scripts/bump-version.sh "$new_version"

          if [ -z "$(git status --porcelain)" ]; then
            echo "No release candidate changes were generated" >&2
            exit 1
          fi

          changed_files=$(git diff --name-only)
          while IFS= read -r file; do
            case "$file" in
              CHANGELOG.md|composer.json|package.json|lib/PostHog.php|.changeset/*) ;;
              *)
                echo "Unexpected release candidate change: $file" >&2
                exit 1
                ;;
            esac
          done <<< "$changed_files"

          composer_version=$(perl -0ne 'print $1 if /"version"\s*:\s*"([^"]+)"/' composer.json)
          php_version=$(perl -0ne "print \$1 if /public const VERSION = '([^']+)'/" lib/PostHog.php)
          if [ "$new_version" != "$composer_version" ] || [ "$new_version" != "$php_version" ]; then
            echo "Version mismatch: package.json=$new_version composer.json=$composer_version lib/PostHog.php=$php_version" >&2
            exit 1
          fi

          git diff --binary > release.patch
          patch_sha256=$(sha256sum release.patch | awk '{print $1}')

          echo "source-sha=$source_sha" >> "$GITHUB_OUTPUT"
          echo "new-version=$new_version" >> "$GITHUB_OUTPUT"
          echo "patch-sha256=$patch_sha256" >> "$GITHUB_OUTPUT"
          echo "Release candidate $new_version prepared from $source_sha with patch sha256 $patch_sha256"

      - name: Upload release candidate patch
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-candidate-${{ steps.candidate.outputs.source-sha }}
          path: release.patch
          if-no-files-found: error
          retention-days: 5

      - name: Send failure event to PostHog
        if: ${{ failure() }}
        continue-on-error: true
        uses: PostHog/posthog-github-action@9a6a19d360820ab4d95ecc4a5a7564062c895f84 # v1.3.0
        with:
          posthog-token: "${{ secrets.POSTHOG_PROJECT_API_KEY }}"
          event: "posthog-sdk-github-release-workflow-failure"
          properties: >-
            {
              "commitSha": "${{ github.sha }}",
              "jobStatus": "${{ job.status }}",
              "ref": "${{ github.ref }}",
              "repository": "${{ github.repository }}",
              "sdk": "posthog-php",
              "jobName": "prepare-release-candidate",
              "packageName": "posthog-php",
              "packageVersion": "${{ steps.candidate.outputs.new-version || 'unknown' }}",
              "actionUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "alertText": ":rotating_light: Failed to prepare release candidate posthog-php@${{ steps.candidate.outputs.new-version }} :rotating_light:",
              "alertContext": "The release candidate preparation step failed before approval or publish."
            }


  verify-release-candidate:
    name: Verify release candidate
    needs: [check-changesets, prepare-release-candidate]
    runs-on: ubuntu-latest
    if: needs.check-changesets.outputs.has-changesets == 'true'
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare-release-candidate.outputs.source-sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Download release candidate patch
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-candidate-${{ needs.prepare-release-candidate.outputs.source-sha }}
          path: release-candidate

      - name: Apply and validate release candidate patch
        env:
          EXPECTED_VERSION: ${{ needs.prepare-release-candidate.outputs.new-version }}
        run: |
          set -euo pipefail

          git apply --index release-candidate/release.patch

          package_version=$(perl -0ne 'print $1 if /"version"\s*:\s*"([^"]+)"/' package.json)
          composer_version=$(perl -0ne 'print $1 if /"version"\s*:\s*"([^"]+)"/' composer.json)
          php_version=$(perl -0ne "print \$1 if /public const VERSION = '([^']+)'/" lib/PostHog.php)
          if [ "$EXPECTED_VERSION" != "$package_version" ] || [ "$EXPECTED_VERSION" != "$composer_version" ] || [ "$EXPECTED_VERSION" != "$php_version" ]; then
            echo "Version mismatch: expected=$EXPECTED_VERSION package.json=$package_version composer.json=$composer_version lib/PostHog.php=$php_version" >&2
            exit 1
          fi

      - name: Check tag and release do not already exist
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_VERSION: ${{ needs.prepare-release-candidate.outputs.new-version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          check_missing() {
            local description="$1"
            shift
            local output
            local status

            if output=$("$@" 2>&1); then
              echo "$description already exists for $EXPECTED_VERSION" >&2
              exit 1
            else
              status=$?
            fi

            if grep -q "HTTP 404" <<< "$output" || grep -q "Not Found" <<< "$output"; then
              return 0
            fi

            echo "Could not check whether $description exists: $output" >&2
            exit "$status"
          }

          check_missing "GitHub release" gh api "repos/$REPOSITORY/releases/tags/$EXPECTED_VERSION"
          check_missing "git tag" gh api "repos/$REPOSITORY/git/ref/tags/$EXPECTED_VERSION"

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: 8.4
          tools: composer

      - name: Validate composer files
        run: composer validate --no-check-lock --no-check-version --strict

      - name: Send failure event to PostHog
        if: ${{ failure() }}
        continue-on-error: true
        uses: PostHog/posthog-github-action@9a6a19d360820ab4d95ecc4a5a7564062c895f84 # v1.3.0
        with:
          posthog-token: "${{ secrets.POSTHOG_PROJECT_API_KEY }}"
          event: "posthog-sdk-github-release-workflow-failure"
          properties: >-
            {
              "commitSha": "${{ github.sha }}",
              "jobStatus": "${{ job.status }}",
              "ref": "${{ github.ref }}",
              "repository": "${{ github.repository }}",
              "sdk": "posthog-php",
              "jobName": "verify-release-candidate",
              "packageName": "posthog-php",
              "packageVersion": "${{ needs.prepare-release-candidate.outputs.new-version || 'unknown' }}",
              "actionUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "alertText": ":rotating_light: Failed to verify release candidate posthog-php@${{ needs.prepare-release-candidate.outputs.new-version }} :rotating_light:",
              "alertContext": "The release candidate verification step failed before approval or publish."
            }


  notify-approval-needed:
    name: Notify Slack - Approval Needed
    needs: [check-changesets, prepare-release-candidate, verify-release-candidate]
    if: needs.check-changesets.outputs.has-changesets == 'true' && needs.prepare-release-candidate.result == 'success' && needs.verify-release-candidate.result == 'success'
    uses: posthog/.github/.github/workflows/notify-approval-needed.yml@cb0979b67dcd585828b61ac45927eef4da8f6287 # main
    with:
      slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
      slack_user_group_id: ${{ vars.GROUP_CLIENT_LIBRARIES_SLACK_GROUP_ID }}
    secrets:
      slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
      posthog_project_api_key: ${{ secrets.POSTHOG_PROJECT_API_KEY }}

  release:
    name: Publish release
    needs: [check-changesets, prepare-release-candidate, verify-release-candidate, notify-approval-needed]
    runs-on: ubuntu-latest
    if: always() && needs.check-changesets.outputs.has-changesets == 'true' && needs.verify-release-candidate.result == 'success' && needs.notify-approval-needed.result == 'success'
    environment: "Release"
    permissions:
      actions: read
      contents: read
    steps:
      - name: Notify Slack - Approved
        if: needs.notify-approval-needed.outputs.slack_ts != ''
        uses: posthog/.github/.github/actions/slack-thread-reply@cb0979b67dcd585828b61ac45927eef4da8f6287 # main
        with:
          slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
          slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
          thread_ts: ${{ needs.notify-approval-needed.outputs.slack_ts }}
          message: "✅ Release approved! Publishing release..."
          emoji_reaction: "white_check_mark"

      - name: Checkout approved source revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare-release-candidate.outputs.source-sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Download verified release candidate patch
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-candidate-${{ needs.prepare-release-candidate.outputs.source-sha }}
          path: release-candidate

      - name: Apply verified release candidate patch
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_PATCH_SHA256: ${{ needs.prepare-release-candidate.outputs.patch-sha256 }}
          EXPECTED_SOURCE_SHA: ${{ needs.prepare-release-candidate.outputs.source-sha }}
          EXPECTED_VERSION: ${{ needs.prepare-release-candidate.outputs.new-version }}
        run: |
          set -euo pipefail

          current_main_sha=$(gh api "repos/${{ github.repository }}/git/ref/heads/main" --jq '.object.sha')
          if [ "$current_main_sha" != "$EXPECTED_SOURCE_SHA" ]; then
            echo "main moved since the release candidate was prepared: expected $EXPECTED_SOURCE_SHA, got $current_main_sha" >&2
            exit 1
          fi

          actual_patch_sha256=$(sha256sum release-candidate/release.patch | awk '{print $1}')
          if [ "$actual_patch_sha256" != "$EXPECTED_PATCH_SHA256" ]; then
            echo "Release candidate patch sha256 mismatch: expected $EXPECTED_PATCH_SHA256, got $actual_patch_sha256" >&2
            exit 1
          fi

          git apply --index release-candidate/release.patch

          package_version=$(perl -0ne 'print $1 if /"version"\s*:\s*"([^"]+)"/' package.json)
          composer_version=$(perl -0ne 'print $1 if /"version"\s*:\s*"([^"]+)"/' composer.json)
          php_version=$(perl -0ne "print \$1 if /public const VERSION = '([^']+)'/" lib/PostHog.php)
          if [ "$EXPECTED_VERSION" != "$package_version" ] || [ "$EXPECTED_VERSION" != "$composer_version" ] || [ "$EXPECTED_VERSION" != "$php_version" ]; then
            echo "Version mismatch: expected=$EXPECTED_VERSION package.json=$package_version composer.json=$composer_version lib/PostHog.php=$php_version" >&2
            exit 1
          fi

          rm -rf release-candidate

      - name: Get GitHub App token
        id: releaser
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.GH_APP_POSTHOG_PHP_RELEASER_APP_ID }}
          private-key: ${{ secrets.GH_APP_POSTHOG_PHP_RELEASER_PRIVATE_KEY }}

      - name: Commit version bump
        id: commit-version-bump
        uses: planetscale/ghcommit-action@a6b150b81dca5dd027baa898604418eec9e11465 # v0.2.22
        with:
          commit_message: "chore: release ${{ needs.prepare-release-candidate.outputs.new-version }} [version bump] [skip ci]"
          repo: ${{ github.repository }}
          branch: main
          file_pattern: "CHANGELOG.md composer.json package.json lib/PostHog.php .changeset"
        env:
          GITHUB_TOKEN: ${{ steps.releaser.outputs.token }}

      - name: Create GitHub release
        if: steps.commit-version-bump.outputs.commit-hash != ''
        env:
          GH_TOKEN: ${{ steps.releaser.outputs.token }}
          NEW_VERSION: ${{ needs.prepare-release-candidate.outputs.new-version }}
          COMMIT_SHA: ${{ steps.commit-version-bump.outputs.commit-hash }}
        run: |
          CHANGELOG_ENTRY=$(awk -v defText="see CHANGELOG.md" '/^## /{if (flag) exit; flag=1} flag && /^##$/{exit} flag; END{if (!flag) print defText}' CHANGELOG.md)
          gh release create "$NEW_VERSION" --target "$COMMIT_SHA" --title "$NEW_VERSION" --notes "$CHANGELOG_ENTRY"

  notify-released:
    name: Notify Slack - Released
    needs: [notify-approval-needed, release]
    runs-on: ubuntu-latest
    if: always() && needs.release.result == 'success' && needs.notify-approval-needed.outputs.slack_ts != ''
    steps:
      - name: Notify Slack - Released
        uses: posthog/.github/.github/actions/slack-thread-reply@cb0979b67dcd585828b61ac45927eef4da8f6287 # main
        with:
          slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
          slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
          thread_ts: ${{ needs.notify-approval-needed.outputs.slack_ts }}
          message: "🚀 posthog-php released successfully!"
          emoji_reaction: "rocket"

  notify-release-failed:
    name: Notify Slack/PostHog - Release Failed
    needs: [prepare-release-candidate, notify-approval-needed, release]
    runs-on: ubuntu-latest
    if: always() && (needs.release.result == 'failure' || needs.release.result == 'cancelled') && needs.notify-approval-needed.outputs.slack_ts != ''
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check whether release was rejected
        id: check-failure
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RESPONSE=$(gh api /repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/approvals)
          REJECTED=$(echo "$RESPONSE" | jq '[.[] | select(.state == "rejected")] | length')
          if [ "$REJECTED" -gt 0 ]; then
            echo "was_rejected=true" >> "$GITHUB_OUTPUT"
            COMMENT=$(echo "$RESPONSE" | jq -r '.[] | select(.state == "rejected") | .comment // empty' | head -1)
            if [ -n "$COMMENT" ]; then
              {
                echo 'message<<EOF'
                echo "🚫 Release was rejected: $COMMENT"
                echo 'EOF'
              } >> "$GITHUB_OUTPUT"
            else
              echo "message=🚫 Release was rejected." >> "$GITHUB_OUTPUT"
            fi
          else
            echo "was_rejected=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send failure event to PostHog
        if: steps.check-failure.outputs.was_rejected != 'true'
        continue-on-error: true
        uses: PostHog/posthog-github-action@9a6a19d360820ab4d95ecc4a5a7564062c895f84 # v1.3.0
        with:
          posthog-token: "${{ secrets.POSTHOG_PROJECT_API_KEY }}"
          event: "posthog-sdk-github-release-workflow-failure"
          properties: >-
            {
              "commitSha": "${{ github.sha }}",
              "jobStatus": "${{ needs.release.result }}",
              "ref": "${{ github.ref }}",
              "repository": "${{ github.repository }}",
              "sdk": "posthog-php",
              "jobName": "release",
              "packageName": "posthog-php",
              "packageVersion": "${{ needs.prepare-release-candidate.outputs.new-version || 'unknown' }}",
              "actionUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "alertText": ":rotating_light: Failed to release posthog-php@${{ needs.prepare-release-candidate.outputs.new-version }} :rotating_light:",
              "alertContext": "The release workflow failed before completion."
            }

      - name: Notify Slack - Failed
        if: steps.check-failure.outputs.was_rejected != 'true'
        uses: posthog/.github/.github/actions/slack-thread-reply@cb0979b67dcd585828b61ac45927eef4da8f6287 # main
        with:
          slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
          slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
          thread_ts: ${{ needs.notify-approval-needed.outputs.slack_ts }}
          message: "❌ Release `posthog-php@${{ needs.prepare-release-candidate.outputs.new-version }}` failed or was cancelled! <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
          emoji_reaction: "x"

      - name: Notify Slack - Rejected
        if: steps.check-failure.outputs.was_rejected == 'true'
        continue-on-error: true
        uses: PostHog/.github/.github/actions/slack-thread-reply@cb0979b67dcd585828b61ac45927eef4da8f6287 # main
        with:
          slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
          slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
          thread_ts: ${{ needs.notify-approval-needed.outputs.slack_ts }}
          message: '${{ steps.check-failure.outputs.message }}'
          emoji_reaction: 'no_entry_sign'
